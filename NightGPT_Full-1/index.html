<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightGPT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">🌙 loading</div>

<div id="chat-container">
  <div id="chat"></div>
  <input id="user-input" placeholder="Type something..." autocomplete="off"/>
  <button id="sendBtn">Send</button>
  <button id="plusBtn">+</button>
</div>

<div id="menu">
  <button onclick="newChat()">New Chat</button>
  <button onclick="uploadFile()">Upload File</button>
  <button onclick="toggleRoast()">Toggle Roast Mode</button>
</div>

<video id="videoPlayer" style="display:none;"></video>
<input type="file" id="fileInput" style="display:none;" onchange="handleFile(this.files)">

<script src="script.js"></script>
</body>
</html>
